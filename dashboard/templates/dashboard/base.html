<!DOCTYPE html>
<html>
<head>
    <title>ProjectFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
    /* ========== GLOBAL ========== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    color: #333;
}

/* ================= MAIN CONTENT FIX ================= */

.col-md-10 {
    margin-left: 230px;
    padding: 40px;
}

/* ================= CARD BOX ================= */

.card-box {
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
    transition: all 0.3s ease;
}

.card-box:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
}

/* ================= STATS CARDS ================= */

.card-box h6 {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 10px;
    font-weight: 500;
}

.card-box h2 {
    font-size: 32px;
    font-weight: 700;
    margin: 0;
}

/* ================= TABLE SECTION ================= */

.card-box table {
    width: 100%;
    margin-top: 10px;
}

.card-box thead {
    background: linear-gradient(90deg, #0f172a, #1e293b);
    color: white;
}

.card-box thead th {
    padding: 14px;
    font-weight: 500;
    border: none;
}

.card-box tbody td {
    padding: 14px;
    border-bottom: 1px solid #f1f1f1;
    vertical-align: middle;
}

.card-box tbody tr:hover {
    background-color: #f8fafc;
}

/* ================= BADGES ================= */

.badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

/* ================= RESPONSIVE FIX ================= */

@media (max-width: 768px) {
    .col-md-10 {
        margin-left: 0;
        padding: 20px;
    }

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }
}

/* ========== SIDEBAR ========== */

.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f172a, #1e293b);
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 10px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

.navbar-top {
    background: white;
    padding: 15px 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}

/* ========== MAIN CONTENT ========== */

.main-content {
    margin-left: 230px;
    padding: 40px;
    min-height: 100vh;
    background: #f4f6f9;
}

.main-content > * {
    animation: fadeIn 0.4s ease-in-out;
}

/* ========== CARDS ========== */

.card-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 25px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    flex: 1;
    min-width: 200px;
    text-align: center;
    transition: 0.3s;
}


.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    font-size: 16px;
    color: #666;
    margin-bottom: 10px;
}

.card h1 {
    font-size: 32px;
}

/* ========== TABLE ========== */

.task-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 30px;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

.task-table th {
    background: linear-gradient(90deg, #0f172a, #1e293b);
    color: white;
    padding: 18px;
}

.task-table td {
    padding: 18px;
    border-bottom: 1px solid #f1f1f1;
}

.task-table tr:hover {
    background: #f9fafb;
    transition: 0.2s;
}

/* ========== STATUS BADGES ========== */

.status {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}

.completed {
    background: #dcfce7;
    color: #16a34a;
}

.in-progress {
    background: #fef3c7;
    color: #d97706;
}

.pending {
    background: #fee2e2;
    color: #dc2626;
}

/* ========== PRIORITY BADGES ========== */

.priority {
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 13px;
}

.high {
    background: #fee2e2;
    color: #dc2626;
}

.medium {
    background: #fef3c7;
    color: #d97706;
}

.low {
    background: #dcfce7;
    color: #16a34a;
}

/* ========== FORM ELEMENTS ========== */

select, input {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

select:focus, input:focus {
    border-color: #2563eb;
}

/* ========== BUTTONS ========== */

button {
    padding: 8px 15px;
    border-radius: 8px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1e40af;
}

/* ========== HEADINGS ========== */

h2 {
    margin-bottom: 20px;
}

/* ========== PROJECT CARDS ========== */

.project-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
}

.project-card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    width: 300px;
    transition: 0.3s;
}

.project-card:hover {
    transform: translateY(-5px);
}

.project-card h3 {
    margin-bottom: 10px;
    color: #0f172a;
}

.project-card p {
    color: #666;
    font-size: 14px;
}

/* ========== FILTER BAR ========== */

.filter-bar {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.sort-select {
    width: 200px;
    border-radius: 10px;
    transition: 0.3s;
}

.sort-select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
}

.sort-btn {
    border-radius: 10px;
    padding: 8px 18px;
}

</style>
</head>

<body>

<body>

<div class="sidebar">
    <h4>ProjectFlow</h4>
    <hr>
    <a href="/dashboard/"><i class="bi bi-grid"></i> Dashboard</a>
    <a href="/projects/"><i class="bi bi-folder"></i> Projects</a>
    <a href="/tasks/"><i class="bi bi-list-task"></i> Tasks</a>
    <hr>
    <p>👤 {{ request.user.username }}</p>
    <a href="/logout/">Logout</a>
</div>

<div class="main-content">
    <div class="navbar-top d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">Welcome back, {{ request.user.username }} 👋</h5>
        <span class="text-muted">Dashboard</span>
    </div>

    {% block content %}{% endblock %}
</div>

</body>
</html>
